<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <title>Block Explorer</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="app">
      <h1>Block Explorer</h1>
      <p>Antal block i kedjan: <span id="blockCount">Laddar...</span></p>
      
      <hr>

      <h2>Kolla balans</h2>
      <input type="text" id="addressInput" placeholder="0x...">
      <button id="checkBalanceBtn">Hämta Balans</button>
      <p id="balanceDisplay"></p>

      <hr>

      <h2>Skicka ETH</h2>
      <input type="text" id="toAddress" placeholder="Till adress">
      <input type="number" id="amount" placeholder="Mängd ETH" step="0.001">
      <button id="sendBtn">Skicka Transaktion</button>
      <p id="statusMsg"></p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
